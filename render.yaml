services:
  - type: web
    name: jurisgen-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements_minimal.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CLAUDE_AUTH_MODE
        value: ""
      - key: LLM_PROVIDER
        value: anthropic
      - key: JUREMA_PROVIDER
        value: hf
      - key: HF_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
