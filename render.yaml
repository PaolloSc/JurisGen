services:
  - type: web
    name: jurisgen-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JUREMA_PROVIDER
        value: hf
      - key: HF_API_KEY
        sync: false
