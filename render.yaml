services:
  - type: web
    name: jurisgen-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements_minimal.txt && curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs && npm install -g @anthropic-ai/claude-code
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CLAUDE_AUTH_MODE
        value: cli
      - key: LLM_PROVIDER
        value: claude_cli
      - key: JUREMA_PROVIDER
        value: hf
      - key: HF_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
