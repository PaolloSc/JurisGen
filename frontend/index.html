<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JurisGen AI — Gerador de Documentos Jurídicos</title>
    <style>
      :root {
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { margin: 0; padding: 0; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #fff; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      ::selection { background: rgba(124,58,237,0.3); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      button { font-family: inherit; }
      input, textarea { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
