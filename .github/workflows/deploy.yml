name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        run: |
          VITE_API_BASE="${{ secrets.VITE_API_BASE }}" npm run build

      - name: Verify build output
        run: ls -la dist/

  deploy-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        env:
          CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt

# NOTE: Para ativar este passo:
# 1. Abra https://dashboard.render.com → jurisgen-backend → Settings → Deploy Hooks
# 2. Copie a URL do "Deploy Hook" (formato: https://api.render.com/v1/hooks/standard/xxx)
# 3. No GitHub: Settings → Secrets and variables → Actions → New repository secret
# 4. Nome: RENDER_DEPLOY_HOOK_URL, Valor: cole a URL do passo 2
