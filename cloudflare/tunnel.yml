# ============================================================
# JurisGen AI — Cloudflare Named Tunnel Configuration
# ============================================================
# IMPORTANTE: Este arquivo é para Named Tunnels (domínio próprio).
# Para testes rápidos, use: cloudflared tunnel --url http://localhost:80
#
# Setup:
#   cloudflared tunnel login
#   cloudflared tunnel create jurisgen
#   cloudflared tunnel route dns jurisgen jurisgen.seu-dominio.com
#   Substitua <TUNNEL_ID> pelo UUID gerado acima
#
# Execução (no HOST, fora do Docker):
#   cloudflared tunnel --config cloudflare/tunnel.yml run
# ============================================================

tunnel: <TUNNEL_ID>
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

# Configura a origem local (nginx do Docker expõe porta 80 no host)
ingress:
  # Toda a aplicação via nginx (frontend + /api/ proxy)
  - hostname: jurisgen.seu-dominio.com
    service: http://localhost:80
    originRequest:
      connectTimeout: 30s
      httpHostHeader: jurisgen.seu-dominio.com
      keepAliveConnections: 10
      keepAliveTimeout: 90s
      tcpKeepAlive: 30s

  # Fallback
  - service: http_status:404
