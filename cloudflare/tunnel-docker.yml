# ============================================================
# JurisGen AI — Cloudflare Named Tunnel (Docker interno)
# ============================================================
# Usado quando cloudflared roda como serviço Docker.
# Usa nomes de serviço Docker (frontend, backend) — NÃO localhost.
#
# Setup:
#   cloudflared tunnel login
#   cloudflared tunnel create jurisgen
#   cloudflared tunnel route dns jurisgen jurisgen.seu-dominio.com
#   Substitua <TUNNEL_ID> pelo UUID gerado acima
# ============================================================

tunnel: <TUNNEL_ID>
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

ingress:
  # Toda a aplicação via nginx (frontend + /api/ proxiado para backend)
  # "frontend" = nome do serviço Docker, porta 80 do container nginx
  - hostname: jurisgen.seu-dominio.com
    service: http://frontend:80
    originRequest:
      connectTimeout: 30s
      keepAliveConnections: 10
      keepAliveTimeout: 90s
      tcpKeepAlive: 30s
      noHappyEyeballs: false

  # Fallback
  - service: http_status:404
