# ============================================================
# JurisGen AI — Docker Compose override para Cloudflare Tunnel
# ============================================================
# Uso: docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
#
# Como funciona:
#   - cloudflared roda DENTRO do Docker e acessa os outros serviços
#     via Docker DNS (frontend:80, backend:8000) — NÃO via localhost
#   - Portas NÃO são expostas ao host (mais seguro)
#   - Para named tunnel: configure cloudflare/tunnel-docker.yml com TUNNEL_ID
#   - Para quick tunnel (teste): use TUNNEL_TOKEN no ambiente
# ============================================================

services:
  ollama:
    ports: []  # Sem exposição externa

  backend:
    ports: []  # Sem exposição externa
    environment:
      - CORS_REGEX=https://.*\.trycloudflare\.com|https://.*\.pages\.dev

  frontend:
    ports: []  # Sem exposição externa — cloudflared acessa via Docker DNS

  cloudflared:
    image: cloudflare/cloudflared:latest
    # Quick Tunnel (teste): define TUNNEL_TOKEN no .env ou passe via CLI
    # Named Tunnel: remova o command abaixo e use tunnel-docker.yml
    command: >
      tunnel --no-autoupdate run
      --token ${TUNNEL_TOKEN:-}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    volumes:
      # Para Named Tunnel (opcional): monta config e credenciais
      - ./cloudflare/tunnel-docker.yml:/etc/cloudflared/tunnel.yml:ro
      - ${USERPROFILE:-${HOME}}/.cloudflared:/root/.cloudflared:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
