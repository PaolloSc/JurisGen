services:
  - type: web
    name: jurisgen-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.railway
    autoDeploy: true
    envVars:
      - key: CLAUDE_AUTH_MODE
        value: cli
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MARITACA_API_KEY
        sync: false
      - key: JUREMA_PROVIDER
        value: hf
      - key: HF_API_KEY
        sync: false
      - key: CNJ_API_KEY
        sync: false
