services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CLAUDE_AUTH_MODE=cli
      - JUREMA_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - JUREMA_OLLAMA_MODEL=jurema
      # sabia-4 (Maritaca) — pesquisa jurisprudência e redige seções
      # Configure MARITACA_API_KEY no arquivo backend/.env
      - MARITACA_BASE_URL=https://chat.maritaca.ai/api
      - MARITACA_MODEL=sabia-4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${USERPROFILE:-${HOME}}/.claude:/root/.claude:ro
      - ${USERPROFILE:-${HOME}}/.local/share/claude-code:/root/.local/share/claude-code:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        # Empty = uses relative /api/ path (proxied by nginx)
        VITE_API_BASE: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

